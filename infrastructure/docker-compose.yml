services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wpfixpilot
      POSTGRES_USER: wpfixpilot
      POSTGRES_PASSWORD: wpfixpilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpfixpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

