name: CI

on:
  push:
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2

  backend:
    runs-on: ubuntu-latest
    env:
      WP_FIXPILOT_DATABASE_URL: postgresql+psycopg://wpfixpilot:wpfixpilot@127.0.0.1:55432/wpfixpilot
      WP_FIXPILOT_POSTGRES_TEST_URL: postgresql+psycopg://wpfixpilot:wpfixpilot@127.0.0.1:55432/wpfixpilot
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wpfixpilot
          POSTGRES_USER: wpfixpilot
          POSTGRES_PASSWORD: wpfixpilot
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U wpfixpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: alembic upgrade head
      - run: pytest
      - run: pip install pip-audit && pip-audit --skip-editable

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --run
      - run: npm run build
      - run: npm audit --audit-level=high

  plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin/wp-fixpilot-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: php tests/auth-test.php
      - run: php tests/change-controller-test.php
      - run: php tests/page-package-test.php
